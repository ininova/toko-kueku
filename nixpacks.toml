[variables]
PHP_VERSION = "8.2"
NODE_VERSION = "22"

[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.gd",
  "php82Extensions.mbstring",
  "php82Extensions.zip",
  "php82Extensions.bcmath",
  "php82Extensions.fileinfo",
  "nodejs_22"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm install",
  "npm run build"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"